const data=RAW.map(([date,n_total,n_tanker,n_cargo])=>({
  date,n_total,n_tanker,n_cargo,
  short:new Date(date+"T00:00:00").toLocaleDateString("en-NZ",{month:"short",day:"numeric"}),
}));
const withMA=data.map((d,i)=>{
  if(i<6)return{...d,ma7:null};
  const s=data.slice(i-6,i+1).reduce((a,x)=>a+x.n_total,0);
  return{...d,ma7:Math.round(s/7*100)/100};
});
const crisis=withMA.filter(d=>d.date>="2026-02-20");
const postStrike=withMA.filter(d=>d.date>="2026-03-01");
const preCrisis=data.filter(d=>d.date>="2026-02-01"&&d.date<="2026-02-27");
const preAvg=Math.round(preCrisis.reduce((s,d)=>s+d.n_total,0)/preCrisis.length*10)/10;
const latestMA=withMA.filter(d=>d.ma7!==null).slice(-1)[0];
const latestDay=data.slice(-1)[0];
const crisisMAs=postStrike.filter(d=>d.ma7!==null);
const peakMA=Math.max(...crisisMAs.map(d=>d.ma7));
const peakD=crisisMAs.find(d=>d.ma7===peakMA);
const zeroDays=postStrike.filter(d=>d.n_total===0);
const deadline=new Date("2026-06-30T23:59:59Z");
const daysLeft=Math.max(0,Math.ceil((deadline-new Date())/86400000));

function buildDecay(){
  const pts=[];const rM=16;
  for(let d=0;d<=daysLeft;d++){
    const left=daysLeft-d;
    const ramp=1/(1+Math.exp(-0.5*(left-rM)));
    const yes=Math.max(1,Math.round(17*ramp*(left/daysLeft)));
    const no=Math.min(99,100-yes);
    const profit=Math.max(0,no-84);
    const dt=new Date();dt.setDate(dt.getDate()+d);
    pts.push({day:d,date:`${dt.getDate()}/${dt.getMonth()+1}`,daysLeft:left,
      yesEst:yes,noEst:no,profit,profitPct:((profit/84)*100).toFixed(1),
      ramp:(ramp*100).toFixed(0)});
  }
  return pts;
}

const Tip=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return React.createElement("div",{style:{background:"#0e0e16",border:"1px solid #252535",
    borderRadius:3,padding:"7px 10px",fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:"#b0b8c4"}},
    React.createElement("div",{style:{fontWeight:700,color:"#606878",marginBottom:2}},label),
    payload.filter(p=>p.value!=null).map((p,i)=>
      React.createElement("div",{key:i,style:{color:p.color}},
        p.name,": ",React.createElement("b",null,
          typeof p.value==="number"?(Number.isInteger(p.value)?p.value:p.value.toFixed(2)):p.value)))
  );
};
